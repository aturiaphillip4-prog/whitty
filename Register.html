    <form>
        <h2>REGISTER WITH SWEET TASTE BAKERY</h2>
        <p>We are best in producing high quality products</p>

        <fieldset>
            <legend>Customer Registration</legend>
        <label for="name">Name:</label>

        <input type="password" required> <br> <br>

        <label for="name">Phone Number:</label>
        <input type="tel" placeholder="0700-000-000" required> <br> <br>
        <label for="confirm">Confirm Password:</label>
        <input type="password" name="" required> <br> <br>
        <input type="submit" value="Register" class="register-c">
        </fieldset>
